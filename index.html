<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dinners">
<title>Dinners — week of 2026-07-06</title>
<style>
:root{
  --bg:#faf7f2; --card:#ffffff; --ink:#2b2620; --sub:#8a8072; --line:#e8e1d5;
  --accent:#c2571b; --accent-soft:#fbeadd; --good:#3d8a4e; --check:#b9b0a1;
  --shadow:0 1px 3px rgba(60,45,20,.08);
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#191613; --card:#242019; --ink:#ece5d8; --sub:#9a9081; --line:#3a332a;
  --accent:#e8813f; --accent-soft:#3a2a1c; --good:#6cbf7d; --check:#5c554a; --shadow:0 1px 3px rgba(0,0,0,.3); }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font:17px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased}
body{padding-bottom:calc(70px + env(safe-area-inset-bottom))}
header.app{padding:calc(14px + env(safe-area-inset-top)) 18px 10px;}
header.app h1{font-size:22px;margin:0 0 2px;font-weight:700}
header.app .stats{color:var(--sub);font-size:13.5px}
.wrap{max-width:680px;margin:0 auto;padding:0 14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
/* ---- tabs ---- */
nav.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--card);
  border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);z-index:10}
nav.tabs button{flex:1;border:0;background:none;color:var(--sub);font:600 12px/1 inherit;
  padding:10px 0 8px;cursor:pointer}
nav.tabs button .ico{display:block;font-size:22px;margin-bottom:3px}
nav.tabs button.on{color:var(--accent)}
/* ---- shop ---- */
.progress{height:6px;background:var(--line);border-radius:3px;margin:10px 0 16px;overflow:hidden}
.progress i{display:block;height:100%;background:var(--good);border-radius:3px;transition:width .25s}
h2.cat{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);margin:20px 4px 8px}
.item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;-webkit-user-select:none}
.item:last-child{border-bottom:0}
.box{flex:0 0 26px;height:26px;border:2px solid var(--check);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;transition:all .15s}
.item.done .box{background:var(--good);border-color:var(--good)}
.item .txt{flex:1;min-width:0}
.item .nm{font-weight:600}
.item .qt{color:var(--sub);font-size:14px}
.item.done .nm,.item.done .qt{text-decoration:line-through;color:var(--check)}
.item .rcp{flex:0 0 auto;color:var(--sub);font-size:12px;background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:2px 8px}
.staples{color:var(--sub);font-size:13.5px;margin:16px 4px 8px}
.reset{display:block;margin:22px auto 8px;border:1px solid var(--line);background:var(--card);color:var(--sub);border-radius:999px;padding:8px 18px;font:600 14px inherit;cursor:pointer}
/* ---- cook list ---- */
.rcard{display:flex;gap:14px;padding:12px;cursor:pointer;align-items:center;margin-bottom:12px}
.rcard img{width:86px;height:86px;object-fit:cover;border-radius:10px;flex:0 0 86px;background:var(--line)}
.rcard .noimg{width:86px;height:86px;border-radius:10px;flex:0 0 86px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:34px}
.rcard h3{margin:0 0 4px;font-size:17px}
.rcard .meta{color:var(--sub);font-size:13px}
.rcard .badges{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:12px;font-weight:600;border-radius:999px;padding:2px 9px;background:var(--accent-soft);color:var(--accent)}
.badge.ck{background:transparent;border:1.5px solid var(--line);color:var(--sub)}
.rcard.cooked{opacity:.55}
.rcard.cooked h3{text-decoration:line-through}
/* ---- recipe detail ---- */
.back{position:sticky;top:0;z-index:5;background:var(--bg);padding:calc(10px + env(safe-area-inset-top)) 4px 8px;display:flex;align-items:center;gap:8px}
.back button{border:0;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 16px;font:600 15px inherit;color:var(--accent);cursor:pointer}
.hero{width:100%;height:210px;object-fit:cover;border-radius:14px;background:var(--line)}
.detail h1{font-size:24px;margin:14px 2px 6px}
.detail .meta{color:var(--sub);font-size:14px;margin:0 2px 12px}
.banner{background:var(--accent-soft);color:var(--accent);border-radius:12px;padding:11px 14px;font-size:14.5px;font-weight:600;margin-bottom:16px}
.banner small{display:block;font-weight:400;margin-top:3px;opacity:.85}
h2.sec{font-size:18px;margin:22px 2px 10px}
.ing{display:flex;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;-webkit-user-select:none}
.ing:last-child{border-bottom:0}
.ing .box{flex:0 0 22px;height:22px;border-radius:6px;font-size:13px}
.ing.done{opacity:.5}.ing.done .txt{text-decoration:line-through}
.ing b{font-weight:700}
.ing .note{color:var(--sub);font-size:13px}
.step{display:flex;gap:12px;padding:13px 14px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;-webkit-user-select:none}
.step:last-child{border-bottom:0}
.step .n{flex:0 0 28px;height:28px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.step.done{opacity:.45}.step.done .t{text-decoration:line-through}
.step .sec-name{font-weight:700;display:block;margin-bottom:2px}
.notes{color:var(--sub);font-size:14.5px;white-space:pre-wrap;padding:2px 4px}
.srclink{display:block;text-align:center;margin:20px 0 8px;color:var(--accent);font-weight:600;text-decoration:none;font-size:15px}
.cookedbtn{display:block;width:100%;margin:18px 0 6px;border:0;border-radius:12px;padding:14px;font:700 16px inherit;cursor:pointer;background:var(--good);color:#fff}
.cookedbtn.un{background:var(--card);color:var(--sub);border:1px solid var(--line)}
.hide{display:none}
</style>
</head>

ecipes":[4]},{"name":"fettuccine pasta","class":"pantry","label":"Pantry","qty":"230 g","recipes":[2]},{"name":"garlic powder","class":"pantry","label":"Pantry","qty":"0.33 tsp","recipes":[4]},{"name":"ground cumin","class":"pantry","label":"Pantry","qty":"0.67 tsp","recipes":[1]},{"name":"hawaiian sweet rolls","class":"pantry","label":"Pantry","qty":"8","recipes":[4]},{"name":"honey","class":"pantry","label":"Pantry","qty":"1.33 Tbsp","recipes":[3]},{"name":"italian seasoning","class":"pantry","label":"Pantry","qty":"0.33 tsp","recipes":[5]},{"name":"mayonnaise","class":"pantry","label":"Pantry","qty":"1.33 Tbsp","recipes":[4]},{"name":"nonstick cooking spray","class":"pantry","label":"Pantry","qty":"some","recipes":[4]},{"name":"paprika","class":"pantry","label":"Pantry","qty":"0.17 tsp","recipes":[4]},{"name":"smoked paprika","class":"pantry","label":"Pantry","qty":"0.33 tsp","recipes":[1]},{"name":"soy sauce","class":"pantry","label":"Pantry","qty":"0.33 cup","recipes":[3]},{"name":"spaghetti","class":"pantry","label":"Pantry","qty":"230 g","recipes":[5]},{"name":"tomato paste","class":"pantry","label":"Pantry","qty":"170 g","recipes":[1,5]},{"name":"tomatoes with green chiles","class":"pantry","label":"Pantry","qty":"190 g","recipes":[1]},{"name":"worcestershire sauce","class":"pantry","label":"Pantry","qty":"0.67 tsp","recipes":[4]}],"recipes":[{"n":1,"id":31458,"url":"https://www.budgetbytes.com/weeknight-black-bean-chili/","title":"Black Bean Chili","cuisine":"American","primary":"beef","totalTime":30,"rating":4.72,"proteinPerServe":33,"scale":0.67,"servings":6,"image":"https://www.budgetbytes.com/wp-content/uploads/2023/09/Black-Bean-Chili-bowl.jpg","prep":10,"cook":20,"calories":358,"batch":"⅔×","ingredients":[{"qty":"⅔ Tbsp","name":"olive oil","note":""},{"qty":"⅔","name":"yellow onion","note":""},{"qty":"2 ⅔ cloves","name":"garlic","note":""},{"qty":"150 g","name":"ground beef","note":""},{"qty":"850 g","name":"black beans, drained","note":""},{"qty":"190 g","name":"diced tomatoes with green chiles*","note":""},{"qty":"110 g","name":"tomato paste","note":""},{"qty":"⅔ Tbsp","name":"chili powder","note":""},{"qty":"⅔ tsp","name":"ground cumin","note":""},{"qty":"⅓ tsp","name":"smoked paprika","note":""},{"qty":"⅓ tsp","name":"dried oregano","note":""},{"qty":"⅓ tsp","name":"salt","note":""},{"qty":"1 ⅓ cup","name":"water","note":""}],"steps":[{"section":"","text":"Dice the onion and mince the garlic. Add the onion and garlic to a large pot with the olive oil and cook over medium heat just until the onions are softened (2-3 minutes)."},{"section":"","text":"Add the ground beef to the pot and continue to sauté until the beef is cooked through (5-7 minutes)."},{"section":"","text":"Add the drained black beans, diced tomatoes (with juices), tomato paste, chili powder, cumin, smoked paprika, oregano, and water. Stir everything to combine."},{"section":"","text":"Place a lid on the chili and allow it to come up to a simmer. Let the chili simmer for about 15 minutes, stirring occasionally, to let the flavors blend and help the liquid thicken slightly."},{"section":"","text":"Taste the chili and add salt as needed (this will depend on the salt content of your canned goods. I added about ½ tsp). Serve with your favorite chili toppings and enjoy!"}],"notes":"*If you want a mild chili, you can use plain diced tomatoes instead of diced tomatoes with green chiles."},{"n":2,"id":76007,"url":"https://www.budgetbytes.com/fettuccine-alfredo/","title":"Traditional Fettuccine Alfredo","cuisine":"Italian","primary":"veg","totalTime":30,"rating":4.42,"proteinPerServe":26,"scale":0.5,"servings":8,"image":"https://www.budgetbytes.com/wp-content/uploads/2023/02/Homemade-Alfredo-Sauce-Plated.jpg","prep":10,"cook":20,"calories":387,"batch":"½×","ingredients":[{"qty":"230 g","name":"fettuccine pasta","note":"*"},{"qty":"½ stick","name":"salted butter","note":""},{"qty":"½ tsp","name":"salt","note":""},{"qty":"½ tsp","name":"black pepper","note":"ground"},{"qty":"1","name":"garlic cloves","note":"finely minced"},{"qty":"⅜ cup","name":"pasta water","note":"reserved from the fettuccine"},{"qty":"⅝ cup","name":"Parmesan cheese","note":"grated & divided, **"},{"qty":"¼ Tbsp","name":"fresh parsley","note":"minced"}],"steps":[{"section":"Boil","text":"Put salted water on to boil and boil fettuccine noodles for 10-12 minutes until al dente."},{"section":"Sauté","text":"Meanwhile, you can melt butter in a large sauté pan with salt, pepper, and finely minced garlic. Cook on medium low heat for 2-3 minutes until fragrant."},{"section":"Reserve","text":"Once your pasta is cooked, strain it, but reserve at least 3/4 cup of the pasta water! This is an important step! I like to keep my cooked pasta off to the side in the now-empty boiling pot with a clean, damp kitchen towel over the top."},{"section":"Whisk","text":"Add ¼ cup pasta water to the garlic and butter mixture and whisk to combine. Let it bubble and thicken for 3-4 minutes"},{"section":"Mix","text":"Sprinkle in half the grated Parmesan cheese, ¼ cup at a time, while continuously whisking until a smooth sauce forms. Add extra pasta water, if needed (you should have ½ cup of reserved pasta water left to use.)"},{"section":"Toss","text":"Once your pan sauce is done, add the cooked fettuccine, the remaining grated Parmesan cheese, and the minced parsley. Toss to combine."},{"section":"Serve","text":"Top with any remaining grated Parmesan cheese you may have (optional). Serve immediately."}],"notes":"*I kept things traditional and used fettuccine pasta, but you can use any type of pasta you love.\n\n**The original recipe made by Alfredo di Lelio used Parmigiano Reggiano, which I'm sure is absolutely delicious. I personally use standard Parmesan in my version to keep it affordable and easy to find, but if you have the real deal, go for it! I don't recommend using canned Parmesan, though. It can make your sauce grainy."},{"n":3,"id":33091,"url":"https://www.budgetbytes.com/chicken-adobo/","title":"Chicken Adobo","cuisine":"Filipino","primary":"chicken","totalTime":55,"rating":4.79,"proteinPerServe":84,"scale":0.67,"servings":6,"image":"https://www.budgetbytes.com/wp-content/uploads/2018/02/Chicken-Adobo-Overhead.jpg","prep":10,"cook":45,"calories":564,"batch":"⅔×","ingredients":[{"qty":"1220 g","name":"bone-in chicken","note":"skin-on, *"},{"qty":"⅓ cup","name":"soy sauce","note":"4 oz."},{"qty":"⅓ cup","name":"apple cider vinegar","note":"4 oz."},{"qty":"1 ⅓ Tbsp","name":"vegetable oil","note":"1 oz."},{"qty":"1 ⅓ Tbsp","name":"honey","note":"1 oz."},{"qty":"1 ⅓","name":"bay leaves","note":"whole"},{"qty":"⅔ Tbsp","name":"garlic","note":"minced, (about 2 cloves)"},{"qty":"⅔ Tbsp","name":"black peppercorns","note":"whole"}],"steps":[{"section":"Prep","text":"Gather and prep your ingredients."},{"section":"Arrange","text":"Arrange the chicken pieces in a large pot in one layer. Remove the skin if desired."},{"section":"Marinate","text":"Combine the rest of the ingredients (soy sauce, vinegar, honey, oil, garlic, bay leaves, peppercorns) in a bowl and whisk until the honey is dissolved. Partially crush the peppercorns if desired. Pour the marinade over the chicken. Cover and refrigerate for a few hours or overnight.**"},{"section":"Boil","text":"When you’re ready to make the chicken, add just enough water so that the liquid comes just up to the top of the chicken (about 1/2 cup). Cover the pot with a lid, place the pot over a high flame, and bring it up to a rolling boil. When it reaches a boil, reduce the heat to medium/low and let simmer for 30 minutes."},{"section":"Brown","text":"Preheat your broiler on high. Remove the chicken from the pot and place it on a broiler pan (or a sheet pan with wire cooling racks placed on top). Place the chicken under the broiler until it is brown and crispy on top (5-10 minutes), depending on your broiler)."},{"section":"Reduce","text":"While the chicken is broiling, turn pot with the soy/vinegar liquid up to high and bring up to a rapid boil. Allow the liquid to boil heavily until it is reduced in volume by approximately one half. You may need to boil it for 5-10 minutes longer than the chicken is in the oven to get it to this point."},{"section":"Baste","text":"Use a soft brush to baste a few layers of the reduced soy/vinegar liquid onto the browned chicken. You can also toss the chicken in the sauce instead. Serve over rice or noodles and spoon more of the reduced liquid over top."}],"notes":"*I use bone-in, skin-on chicken drumsticks. Any bone-in chicken pieces will work here, just make sure the internal temperature reaches 165°F in the thickest part before serving.\n\n**Make sure to factor in a few hours or overnight to the prep time for this chicken to marinate. If you're short on time, a 30-minute marinade in the fridge will still work!"},{"n":4,"id":152652,"url":"https://www.budgetbytes.com/sliders/","title":"Sliders","cuisine":"American","primary":"beef","totalTime":35,"rating":4.56,"proteinPerServe":39,"scale":0.67,"servings":6,"image":"https://www.budgetbytes.com/wp-content/uploads/2023/08/Sliders-Overhead-Wide.jpg","prep":10,"cook":25,"calories":567,"batch":"⅔×","ingredients":[{"qty":"","name":"nonstick cooking spray","note":""},{"qty":"8","name":"Hawaiian sweet rolls","note":""},{"qty":"⅓ Tbsp","name":"vegetable oil","note":""},{"qty":"300 g","name":"ground beef","note":""},{"qty":"⅓","name":"onion","note":"minced, (about ½ cup, 120g)"},{"qty":"⅔ tsp","name":"Worcestershire sauce","note":""},{"qty":"⅔ tsp","name":"salt","note":""},{"qty":"⅓ tsp","name":"black pepper","note":"freshly cracked"},{"qty":"⅓ tsp","name":"garlic powder","note":""},{"qty":"0.17 tsp","name":"paprika","note":""},{"qty":"1 ⅓ Tbsp","name":"mayonnaise","note":"40g, *"},{"qty":"6 ⅔","name":"cheddar cheese slices","note":"divided, **"},{"qty":"1 ⅓ Tbsp","name":"butter","note":"melted"},{"qty":"⅓ Tbsp","name":"everything bagel seasoning","note":"***"}],"steps":[{"section":"Prep","text":"Gather and prepare all ingredients. Preheat your oven to 350°F and grease a 9x11” baking dish with cooking spray."},{"section":"Slice","text":"Slice the rolls in half lengthwise and place the bottom half in the baking dish."},{"section":"Brown","text":"Heat the vegetable oil in a medium skillet over medium heat. Once hot, add the ground beef, minced onions, Worcestershire sauce, salt, pepper, garlic powder, onion powder, and paprika. Cook the beef for 10 minutes, breaking it up as you go."},{"section":"Remove","text":"Once the beef is no longer pink and cooked through, using a slotted spoon, scoop out the beef mixture into a medium bowl, leaving as much grease in the skillet as possible."},{"section":"Fold","text":"Add the mayonnaise to the beef mixture and fold to combine."},{"section":"Place","text":"Place 5 slices of cheddar cheese on the bottom layer of the Hawaiian rolls, breaking one of the slices to cover the rolls."},{"section":"Layer","text":"Layer the beef mixture evenly on top of the cheddar slices."},{"section":"Top","text":"Top the beef evenly with the remaining cheddar cheese slices, breaking the last slice again."},{"section":"Mix","text":"In a small bowl, stir together the melted butter and everything bagel seasoning."},{"section":"Brush","text":"Place the top of half of the Hawaiian rolls on the beef and cheese. Using a brush, evenly cover the top rolls with the melted butter mixture."},{"section":"Bake","text":"Place the dish on the center rack in the oven and bake for about 12-15 minutes, until golden brown and melty."}],"notes":"*I add a dollop of mayo to the beef for additional flavor and moisture. You can skip this step or add mustard, ketchup, sour cream, BBQ sauce, or plain Greek yogurt if you'd like. It may change the flavor profile depending on the substitution, though.\n\n\n**I love cheddar and think it goes well with these sliders. You can also use provolone, mozzarella, or your favorite cheese.\n\n\n***Everything bagel seasoning is a pre-mixed blend of sesame seeds, poppy seeds, dried garlic, dried onion, and salt. You can switch out the everything bagel seasoning with any herbs and spices you like, or use just sesame or poppy seeds."},{"n":5,"id":32634,"url":"https://www.budgetbytes.com/baked-spaghetti-casserole/","title":"Baked Spaghetti Recipe","cuisine":"American","primary":"pork","totalTime":55,"rating":4.78,"proteinPerServe":38,"scale":0.67,"servings":6,"image":"https://www.budgetbytes.com/wp-content/uploads/2022/10/Baked-Spaghetti-In-Pan-Overhead.jpg","prep":5,"cook":50,"calories":534,"batch":"⅔×","ingredients":[{"qty":"⅔","name":"yellow onion","note":""},{"qty":"2","name":"garlic cloves","note":""},{"qty":"⅔ Tbsp","name":"olive oil","note":""},{"qty":"150 g","name":"Italian sausage","note":"*"},{"qty":"55 g","name":"tomato paste","note":""},{"qty":"530 g","name":"crushed tomatoes","note":""},{"qty":"⅓ tsp","name":"Italian seasoning","note":""},{"qty":"⅓ tsp","name":"salt","note":""},{"qty":"⅓ cup","name":"water","note":""},{"qty":"230 g","name":"spaghetti","note":"uncooked"},{"qty":"⅔ cup","name":"cottage cheese","note":"small curd"},{"qty":"0.17 cup","name":"Parmesan cheese","note":"grated."},{"qty":"0.17 tsp","name":"black pepper","note":"freshly cracked"},{"qty":"⅔ cup","name":"mozzarella","note":"shredded"},{"qty":"⅔ Tbsp","name":"fresh parsley","note":"chopped, (optional garnish)"}],"steps":[{"section":"Dice","text":"Dice the onion and mince the garlic."},{"section":"Cook sausage","text":"Add the olive oil to a large skillet and heat over medium. Add the Italian sausage and cook until browned."},{"section":"Cook onions","text":"Add the chopped onion and minced garlic to the skillet and continue to stir and cook until the onions are soft and translucent."},{"section":"Add seasonings","text":"Add the tomato paste, crushed tomatoes, Italian seasoning, salt, and water. Stir to combine, then allow the sauce to come up to a simmer. Reduce the heat to medium-low and let the sauce simmer while you cook the pasta."},{"section":"Boil water","text":"Preheat the oven to 350 degrees. Add ½ Tbsp salt to a large pot of water and bring it to a boil over high heat. Add the spaghetti and continue to boil until the pasta is tender, but not fully cooked. Drain the pasta in a colander."},{"section":"Add pasta","text":"Add the drained pasta to the sauce and stir to combine."},{"section":"Combine","text":"Combine the cottage cheese, Parmesan, and pepper in a bowl."},{"section":"Add to casserole dish","text":"Lightly grease an 8x11&quot; casserole dish. Layer in half of the spaghetti and sauce, then top with the cottage cheese mixture. Add the second half of the spaghetti and sauce, then top with the shredded mozzarella."},{"section":"Bake","text":"Cover the dish with foil then bake the spaghetti for 30 minutes. Top the spaghetti with chopped parsley, if desired. Let it rest for 5-10 minutes, then slice into six pieces, and serve!"}],"notes":"*Feel free to up the amount of meat to a whole pound if you have room in your budget. You can also swap the Italian sausage for another ground meat, like ground beef, but you’ll lose out on a lot of flavor (Italian sausage is packed with lots of spices). If you decide to use a different type of ground meat, I recommend doubling the herbs and spices you add to the sauce."}]};

}
const scrollMem = {};

function header(){
  const s = DATA.summary;
  return '<header class="app"><h1>Dinners</h1><div class="stats">Week of ' + DATA.date +
    ' · ' + DATA.recipes.length + ' dinners · 4 serves each · avg ' + s.avgProtein + ' g protein/serve' +
    (s.estCost ? ' · ~US$' + s.estCost : '') + '</div></header>';
}

function renderShop(){
  const total = DATA.grocery.length;
  const done = DATA.grocery.filter((g,i) => state.shop[i]).length;
  let h = header();
  h += '<div class="progress"><i style="width:' + (total ? Math.round(done/total*100) : 0) + '%"></i></div>';
  h += '<div style="color:var(--sub);font-size:14px;margin:-8px 4px 4px">' + done + ' of ' + total + ' items</div>';
  for (const cat of CATS){
    const rows = DATA.grocery.map((g,i)=>({g,i})).filter(x => x.g.label === cat);
    if (!rows.length) continue;
    h += '<h2 class="cat">' + cat + '</h2><div class="card">';
    for (const {g,i} of rows){
      h += '<div class="item' + (state.shop[i] ? ' done' : '') + '" data-shop="' + i + '">' +
        '<div class="box">' + (state.shop[i] ? '✓' : '') + '</div>' +
        '<div class="txt"><div class="nm">' + escp(g.name) + '</div><div class="qt">' + escp(g.qty) + '</div></div>' +
        '<div class="rcp">' + g.recipes.map(n => '#'+n).join(' ') + '</div></div>';
    }
    h += '</div>';
  }
  h += '<div class="staples">Assumed staples (not listed): salt, pepper, water, cooking/olive oil. #n tags = which dinners use the item.</div>';
  h += '<button class="reset" data-reset="shop">Clear all checkmarks</button>';
  app.innerHTML = h;
}

function renderCookList(){
  let h = header();
  h += '<div style="height:8px"></div>';
  DATA.recipes.forEach((r, ri) => {
    const cooked = state.cooked[ri];
    h += '<div class="card rcard' + (cooked ? ' cooked' : '') + '" data-open="' + ri + '">' +
      (r.image ? '<img loading="lazy" src="' + escp(r.image) + '" onerror="this.outerHTML=\'<div class=noimg>🍽</div>\'">' : '<div class="noimg">🍽</div>') +
      '<div><h3>' + r.n + '. ' + escp(r.title) + '</h3>' +
      '<div class="meta">' + [r.cuisine, r.totalTime ? r.totalTime + ' min' : null, r.rating ? '★' + r.rating : null].filter(Boolean).join(' · ') + '</div>' +
      '<div class="badges"><span class="badge">' + escp(r.batch) + ' batch</span>' +
      (r.proteinPerServe ? '<span class="badge">' + r.proteinPerServe + ' g protein</span>' : '') +
      (cooked ? '<span class="badge ck">cooked ✓</span>' : '') +
      '</div></div></div>';
  });
  app.innerHTML = h;
}

function renderRecipe(ri){
  const r = DATA.recipes[ri];
  const ingDone = i => state.ing[ri + '-' + i];
  const stDone = i => state.step[ri + '-' + i];
  let h = '<div class="back"><button data-back="1">‹ Back</button></div><div class="detail">';
  if (r.image) h += '<img class="hero" loading="lazy" src="' + escp(r.image) + '" onerror="this.remove()">';
  h += '<h1>' + escp(r.title) + '</h1>';
  h += '<div class="meta">' + [r.cuisine,
      (r.prep ? 'prep ' + r.prep + ' min' : null), (r.cook ? 'cook ' + r.cook + ' min' : null),
      (r.rating ? '★' + r.rating : null), (r.proteinPerServe ? r.proteinPerServe + ' g protein/serve' : null),
      (r.calories ? r.calories + ' kcal/serve' : null)
    ].filter(Boolean).join(' · ') + '</div>';
  h += '<div class="banner">Make a ' + escp(r.batch) + ' batch — the ingredient amounts below are already scaled to 4 serves.' +
    '<small>Step text may mention the original (' + r.servings + '-serve) quantities — trust the list below.</small></div>';
  h += '<h2 class="sec">Ingredients</h2><div class="card">';
  r.ingredients.forEach((ing, i) => {
    h += '<div class="ing' + (ingDone(i) ? ' done' : '') + '" data-ing="' + i + '">' +
      '<div class="box">' + (ingDone(i) ? '✓' : '') + '</div>' +
      '<div class="txt"><b>' + escp(ing.qty) + '</b> ' + escp(ing.name) +
      (ing.note ? ' <span class="note">(' + escp(ing.note) + ')</span>' : '') + '</div></div>';
  });
  h += '</div><h2 class="sec">Steps</h2><div class="card">';
  r.steps.forEach((s, i) => {
    h += '<div class="step' + (stDone(i) ? ' done' : '') + '" data-step="' + i + '">' +
      '<div class="n">' + (i + 1) + '</div><div class="t">' +
      (s.section ? '<span class="sec-name">' + escp(s.section) + '</span>' : '') + escp(s.text) + '</div></div>';
  });
  h += '</div>';
  if (r.notes) h += '<h2 class="sec">Notes</h2><div class="notes">' + escp(r.notes) + '</div>';
  h += '<button class="cookedbtn' + (state.cooked[ri] ? ' un' : '') + '" data-cooked="1">' +
    (state.cooked[ri] ? 'Cooked ✓ — tap to unmark' : 'Mark as cooked') + '</button>';
  h += '<a class="srclink" href="' + escp(r.url) + '" target="_blank" rel="noopener">View original on Budget Bytes ↗</a>';
  h += '</div>';
  app.innerHTML = h;
  window.scrollTo(0, 0);
}

function escp(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

app.addEventListener('click', (e) => {
  const t = e.target.closest('[data-shop],[data-open],[data-back],[data-ing],[data-step],[data-cooked],[data-reset]');
  if (!t) return;
  if (t.dataset.shop != null){ const i = t.dataset.shop; state.shop[i] = !state.shop[i]; save(); const y = window.scrollY; renderShop(); window.scrollTo(0, y); }
  else if (t.dataset.open != null){ scrollMem[view] = window.scrollY; openRecipe = Number(t.dataset.open); render(); }
  else if (t.dataset.back){ openRecipe = null; render(); }
  else if (t.dataset.ing != null){ const k = openRecipe + '-' + t.dataset.ing; state.ing[k] = !state.ing[k]; save(); const y = window.scrollY; renderRecipe(openRecipe); window.scrollTo(0, y); }
  else if (t.dataset.step != null){ const k = openRecipe + '-' + t.dataset.step; state.step[k] = !state.step[k]; save(); const y = window.scrollY; renderRecipe(openRecipe); window.scrollTo(0, y); }
  else if (t.dataset.cooked){ state.cooked[openRecipe] = !state.cooked[openRecipe]; save(); const y = window.scrollY; renderRecipe(openRecipe); window.scrollTo(0, y); }
  else if (t.dataset.reset){ state.shop = {}; save(); renderShop(); }
});
document.getElementById('tabs').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  scrollMem[view] = openRecipe === null ? window.scrollY : scrollMem[view];
  openRecipe = null; view = b.dataset.v; render();
});
render();
</script>
</body>
</html>
